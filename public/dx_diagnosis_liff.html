<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>和-Node | ビジネスDX診断</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Caveat:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg-color: #c0c294; /* 抹茶セージ */
      --text-color: #2c2c2a; 
      --accent-color: #c8a84b; 
      --stone-base: #3d4b40; /* 青石色 */
      --tech-blue: #4a90e2;
      --shadow-light: #dcdfb0; 
      --shadow-dark: #a4a678;
      --hanko-red: #b22d15;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: 'Noto Sans JP', sans-serif; 
      background-color: var(--bg-color); 
      color: var(--text-color); 
      display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
      background-image: radial-gradient(circle at 100% 150%, transparent 24%, var(--shadow-dark) 24%, var(--shadow-dark) 28%, transparent 28%, transparent 52%, var(--shadow-dark) 52%, var(--shadow-dark) 56%, transparent 56%);
      background-size: 40px 20px;
      background-attachment: fixed;
    }

    .app-container { width: 100%; max-width: 480px; padding: 24px; display: flex; flex-direction: column; gap: 24px; opacity: 0; transition: opacity 0.5s ease; z-index: 1; }
    .app-container.loaded { opacity: 1; }

    header { text-align: center; margin-bottom: 8px; }
    .header-logo { font-family: 'Shippori Mincho', serif; font-size: 26px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-color); }
    .header-sub { font-family: 'Caveat', cursive; font-size: 18px; color: #5a6a51; }
    
    .neu-pressed { 
      background: var(--bg-color); 
      border-radius: 4px; 
      box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light); 
      border: 1px solid rgba(0,0,0,0.05);
      padding: 30px 24px;
      position: relative;
    }

    .btn-rock { 
      width: 100%; padding: 24px; 
      font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 700; 
      color: #f5f5f0;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      background: var(--stone-base);
      background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(0,0,0,0.1) 0%, transparent 50%), linear-gradient(135deg, var(--stone-base) 0%, #2a352c 100%);
      border-radius: 12px 4px 15px 5px / 6px 10px 5px 12px;
      border: 1px solid rgba(0,0,0,0.2);
      box-shadow: 8px 8px 16px rgba(0,0,0,0.4), -2px -2px 6px rgba(255,255,255,0.05), inset 1px 1px 2px rgba(255,255,255,0.1);
      position: relative; overflow: hidden;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-shadow: -1px -1px 2px rgba(0,0,0,0.8), 1px 1px 1px rgba(255,255,255,0.2);
    }

    .btn-rock::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); opacity: 0.15; pointer-events: none; }
    .btn-rock:active { transform: translateY(3px) scale(0.98); box-shadow: 2px 2px 4px rgba(0,0,0,0.5); filter: brightness(0.9); }
    
    .screen { display: none; flex-direction: column; gap: 24px; animation: fadeIn 0.5s ease forwards; }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    
    .hanko { width: 32px; height: 32px; border: 2px solid var(--hanko-red); border-radius: 4px; color: var(--hanko-red); font-size: 14px; display: flex; align-items: center; justify-content: center; font-weight: 900; writing-mode: vertical-rl; padding: 2px; line-height: 1; }

    .gauge-container { width: 160px; height: 160px; margin: 20px auto; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); }
    .gauge-inner { width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light); }
    .gauge-value { font-size: 36px; font-weight: 700; color: var(--accent-color); font-family: 'Shippori Mincho', serif; }
  </style>
</head>
<body>
  <div id="loading" style="background:var(--bg-color); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; z-index:1000;"><div class="header-logo">和-Node</div></div>
  <div class="app-container" id="app">
    <header><div class="header-logo">和-Node</div><div class="header-sub">ICT & DX Solutions</div></header>
    
    <section id="screen-home" class="screen active">
      <div class="neu-pressed">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div><span id="display-name" style="font-size:20px; font-family:'Shippori Mincho',serif; color:var(--accent-color);">Partner</span> 様</div>
          <div class="hanko">革新</div>
        </div>
        <p style="margin-top:16px; line-height:2; font-size:15px;">あなたのビジネス、もっと楽に。<br>「DXの伸び代」を診断してみませんか？</p>
      </div>
      <button class="btn-rock" onclick="startQuiz()">ビジネスDX診断を始める</button>
      <button class="btn-rock" onclick="showScreen('screen-menu')">ICT・効率化メニュー</button>
    </section>

    <section id="screen-quiz" class="screen">
      <div class="neu-pressed" style="min-height:160px; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 20px;">
        <p id="question-text" style="font-weight:700; font-family:'Shippori Mincho',serif;"></p>
      </div>
      <div style="display:flex; flex-direction:column; gap:16px;">
        <button class="btn-rock" onclick="nextQuestion(0)">すべてデジタル/自動化している</button>
        <button class="btn-rock" onclick="nextQuestion(1)">一部ツールを使っている</button>
        <button class="btn-rock" onclick="nextQuestion(2)">ほとんど手書き・アナログ作業</button>
      </div>
    </section>

    <section id="screen-result" class="screen">
      <div class="neu-pressed" style="text-align:center;">
        <p style="font-size:14px; font-family:'Shippori Mincho',serif; margin-bottom:10px;">診断結果：あなたのDX潜在力</p>
        <div class="gauge-container"><div class="gauge-inner"><div id="result-score" class="gauge-value">0</div><div style="font-size:11px; opacity:0.6;">Potential %</div></div></div>
        <div style="margin-top:20px;"><p style="font-size:12px; opacity:0.7;">IT化で削減できる推定時間</p><div id="saving-time" style="font-size:24px; font-weight:700; color:var(--accent-color); margin:8px 0; font-family:'Shippori Mincho',serif;">0</div><p style="font-size:11px; color:#555;">（年間換算 / 1人あたり）</p></div>
      </div>
      <button class="btn-rock" onclick="sendResultToChat()" style="background:linear-gradient(135deg, #1a1a18 0%, #000000 100%);">診断結果を相談に活かす</button>
      <button class="btn-rock" onclick="showScreen('screen-menu')">おすすめの自動化を見る</button>
    </section>

    <section id="screen-menu" class="screen">
      <div class="neu-pressed" style="text-align:center; margin-bottom:10px;">
        <div class="hanko" style="margin:0 auto 15px;">相談</div>
        <p style="font-size:14px;">ICTに関する無料相談を承ります</p>
      </div>
      <a href="https://lin.ee/o5QFPwc" style="text-decoration:none;"><button class="btn-rock">無料ICT相談（LINE）</button></a>
      <button style="width:100%; padding:18px; background:none; border:none; font-family:'Shippori Mincho',serif; font-size:14px; text-decoration:underline; opacity:0.7;" onclick="showScreen('screen-home')">ホームに戻る</button>
    </section>
  </div>
  <script>
    let userName = "Partner";
    const questions = ["顧客情報や名簿の管理はどうしていますか？", "予約やお問い合わせの受付方法は？", "請求書や伝票の作成・管理はどうしていますか？", "社内やチームでの連絡ツールは何ですか？", "同じ作業の繰り返し（ルーチン）は多いですか？"];
    let currentIdx = 0, score = 0;
    liff.init({ liffId: "YOUR_LIFF_ID" }).then(() => {
      if (liff.isLoggedIn()) { liff.getProfile().then(p => { document.getElementById('display-name').innerText = p.displayName; document.getElementById('loading').style.display='none'; document.getElementById('app').classList.add('loaded'); }); }
      else { document.getElementById('loading').style.display='none'; document.getElementById('app').classList.add('loaded'); }
    }).catch(() => { document.getElementById('loading').style.display='none'; document.getElementById('app').classList.add('loaded'); });
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function startQuiz() { currentIdx = 0; score = 0; updateQuiz(); showScreen('screen-quiz'); }
    function updateQuiz() { document.getElementById('question-text').innerText = questions[currentIdx]; }
    function nextQuestion(s) { score += s; currentIdx++; if (currentIdx < questions.length) updateQuiz(); else showResult(); }
    function showResult() {
      const potential = Math.round((score / (questions.length * 2)) * 100);
      const hoursSaved = score * 48;
      document.getElementById('result-score').innerText = potential;
      document.getElementById('saving-time').innerText = `約 ${hoursSaved} 時間`;
      showScreen('screen-result');
    }
    function sendResultToChat() {
      const potential = document.getElementById('result-score').innerText;
      liff.sendMessages([{ type: 'text', text: `【ビジネスDX診断結果】\nDX潜在力：${potential}%\n業務の効率化について相談したいです。` }]).then(() => alert("トークに送信しました。")).catch(() => alert("失敗しました。"));
    }
  </script>
</body>
</html>
