<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>和-Node | 売れるHP心理診断</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Caveat:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg-color: #c0c294; /* 抹茶セージ */
      --text-color: #2c2c2a; 
      --accent-color: #c8a84b; /* 金 */
      --stone-base: #3d4b40; /* 深い青石色 */
      --shadow-light: #dcdfb0; 
      --shadow-dark: #a4a678;
      --hanko-red: #b22d15;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: 'Noto Sans JP', sans-serif; 
      background-color: var(--bg-color); 
      color: var(--text-color); 
      display: flex; 
      justify-content: center; 
      min-height: 100vh; 
      overflow-x: hidden;
      /* 背景：青海波 */
      background-image: radial-gradient(circle at 100% 150%, transparent 24%, var(--shadow-dark) 24%, var(--shadow-dark) 28%, transparent 28%, transparent 52%, var(--shadow-dark) 52%, var(--shadow-dark) 56%, transparent 56%);
      background-size: 40px 20px;
      background-attachment: fixed;
    }

    .app-container { width: 100%; max-width: 480px; padding: 24px; display: flex; flex-direction: column; gap: 24px; opacity: 0; transition: opacity 0.5s ease; z-index: 1; }
    .app-container.loaded { opacity: 1; }

    header { text-align: center; margin-bottom: 8px; }
    .header-logo { font-family: 'Shippori Mincho', serif; font-size: 26px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-color); }
    .header-sub { font-family: 'Caveat', cursive; font-size: 18px; color: #5a6a51; }
    
    /* 和紙カード */
    .neu-pressed { 
      background: var(--bg-color); 
      border-radius: 4px; 
      box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light); 
      border: 1px solid rgba(0,0,0,0.05);
      padding: 30px 24px;
      position: relative;
    }

    /* 究極の岩石ボタン */
    .btn-rock { 
      width: 100%; padding: 22px; 
      font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 700; 
      color: #f5f5f0; 
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      background: var(--stone-base);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.1) 0%, transparent 50%),
        linear-gradient(135deg, var(--stone-base) 0%, #2a352c 100%);
      border-radius: 12px 4px 15px 5px / 6px 10px 5px 12px;
      border: 1px solid rgba(0,0,0,0.2);
      box-shadow: 
        8px 8px 16px rgba(0,0,0,0.4), 
        -2px -2px 6px rgba(255,255,255,0.05),
        inset 1px 1px 2px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-shadow: 
        -1px -1px 2px rgba(0,0,0,0.8), 
        1px 1px 1px rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
    }

    .btn-rock::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
      opacity: 0.15; pointer-events: none;
    }

    .btn-rock:active { 
      transform: translateY(3px) scale(0.98);
      box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      filter: brightness(0.9);
    }
    
    .btn-sub {
      width: 100%; padding: 18px; background: none; border: none;
      font-family: 'Shippori Mincho', serif; font-size: 14px; color: var(--text-color);
      text-decoration: underline; opacity: 0.7; cursor: pointer;
    }

    .hanko {
      width: 32px; height: 32px; border: 2px solid var(--hanko-red); border-radius: 4px;
      color: var(--hanko-red); font-size: 14px; display: flex; align-items: center; justify-content: center;
      font-weight: 900; writing-mode: vertical-rl; padding: 2px; line-height: 1;
    }

    .gauge-container { width: 180px; height: 180px; margin: 20px auto; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); }
    .gauge-inner { width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light); }
    .gauge-value { font-size: 42px; font-weight: 700; color: var(--accent-color); font-family: 'Shippori Mincho', serif; }
    .gauge-svg { position: absolute; top: 0; left: 0; width: 180px; height: 180px; transform: rotate(-90deg); }
    .gauge-circle { fill: none; stroke: var(--accent-color); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 527.7; stroke-dashoffset: 527.7; transition: stroke-dashoffset 1.5s ease-out; }
    
    .screen { display: none; flex-direction: column; gap: 24px; animation: fadeIn 0.5s ease forwards; }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="loading" style="background:var(--bg-color); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; z-index:1000;"><div class="header-logo">和-Node</div></div>
  <div class="app-container" id="app">
    <header><div class="header-logo">和-Node</div><div class="header-sub">Web Psychology Diagnosis</div></header>
    
    <!-- イントロ画面 -->
    <section id="screen-home" class="screen active">
      <div class="neu-pressed">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div><span id="display-name" style="font-size:20px; font-family:'Shippori Mincho',serif; color:var(--accent-color);">Partner</span> 様</div>
          <div class="hanko">分析</div>
        </div>
        <p style="margin-top:16px; line-height:2; font-size:15px;">あなたのホームページやLPは、<br>顧客心理に響いていますか？<br><br>5つの質問で「心理集客力」を測定します。</p>
      </div>
      <button class="btn-rock" onclick="startQuiz()">売れるHP心理診断を始める</button>
      <button class="btn-rock" onclick="showScreen('screen-menu')">Web集客・心理設計メニュー</button>
    </section>

    <!-- 診断質問画面 -->
    <section id="screen-quiz" class="screen">
      <div class="neu-pressed" style="min-height:180px; display:flex; align-items:center; justify-content:center; text-align:center; padding:30px 20px;">
        <p id="question-text" style="font-weight:700; line-height:2; font-family:'Shippori Mincho',serif;"></p>
      </div>
      <div style="display:flex; flex-direction:column; gap:16px;">
        <button class="btn-rock" onclick="nextQuestion(2)">自信を持って「はい」と言える</button>
        <button class="btn-rock" onclick="nextQuestion(1)">少し不安がある / 改善が必要</button>
        <button class="btn-rock" onclick="nextQuestion(0)">全く意識できていない / ない</button>
      </div>
    </section>

    <!-- 診断結果画面 -->
    <section id="screen-result" class="screen">
      <div class="neu-pressed" style="text-align:center;">
        <p style="font-size:14px; font-family:'Shippori Mincho',serif; margin-bottom:10px;">あなたのHPの「心理集客スコア」</p>
        <div class="gauge-container">
          <svg class="gauge-svg"><circle class="gauge-circle" id="gauge-circle" cx="90" cy="90" r="84"></circle></svg>
          <div class="gauge-inner">
            <div id="result-score" class="gauge-value">0</div>
            <div style="font-size:11px; opacity:0.6; font-weight:bold;">点 / 100点</div>
          </div>
        </div>
        <p id="result-status" style="font-weight:700; margin:15px 0 8px; font-family:'Shippori Mincho',serif;"></p>
        <p id="result-message" style="font-size:13px; color:#444; line-height:1.8; text-align:left;"></p>
      </div>
      <button class="btn-rock" onclick="sendResultToChat()" style="background:linear-gradient(135deg, #1a1a18 0%, #000000 100%);">診断結果をLINEに送信する</button>
      <button class="btn-rock" onclick="showScreen('screen-menu')">無料の改善アドバイスを受ける</button>
    </section>

    <!-- メニュー・相談予約誘導画面 -->
    <section id="screen-menu" class="screen">
      <div class="neu-pressed" style="text-align:center; margin-bottom:10px;">
        <div class="hanko" style="margin:0 auto 15px;">相談</div>
        <p style="font-size:14px; line-height:1.8;">行動経済学と心理学に基づき、<br>「売れる導線設計」へアップデートします。</p>
      </div>
      <a href="https://lin.ee/o5QFPwc" style="text-decoration:none;"><button class="btn-rock">💬 LINEで無料HP心理分析</button></a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLScUbeK9em6cjegU5ha5Sh2fWamrIbxDuhmHDJPIN_no5Sj8-w/viewform?usp=publish-editor" style="text-decoration:none;"><button class="btn-rock">📅 オンライン個別相談予約</button></a>
      <button class="btn-sub" onclick="showScreen('screen-home')">ホームに戻る</button>
    </section>
  </div>
  
  <script>
    let userName = "Partner";
    const questions = [
      "【第一印象】開いて3秒以内に「私のためのページだ！」とターゲットを惹きつけるキャッチコピーがありますか？",
      "【社会的証明】「みんなが使っているから安心」と思わせる、具体的で信頼度の高い「実績数値」や「お客様の声」を十分に載せていますか？",
      "【行動心理】申し込みや問い合わせのボタン文言・配置が明確で、お客様が迷わずに次に進めるストレスフリーな設計ですか？",
      "【ストーリー】商品の特徴（スペック）ばかりでなく、ターゲットの「悩み」に共感し、「理想の未来」へ感情を揺さぶる構成ですか？",
      "【信頼の担保】料金の不明瞭さや運営元の不透明さなど、お客様が「怪しい…」と離脱したくなる心理的摩擦を排除できていますか？"
    ];
    let currentIdx = 0, score = 0;
    
    // LIFF IDは以前のものを自動引き継ぎ、または新規登録したIDへ書き換えてください
    liff.init({ liffId: "2009938117-WSVcVSdL" }).then(() => {
      if (liff.isLoggedIn()) { liff.getProfile().then(p => { document.getElementById('display-name').innerText = p.displayName; hideLoading(); }); }
      else { hideLoading(); }
    }).catch(hideLoading);
    
    function hideLoading() { 
      document.getElementById('loading').style.opacity = '0'; 
      setTimeout(() => { 
        document.getElementById('loading').style.display = 'none'; 
        document.getElementById('app').classList.add('loaded'); 
      }, 500); 
    }
    
    function showScreen(id) { 
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
      document.getElementById(id).classList.add('active'); 
      window.scrollTo(0,0); 
    }
    
    function startQuiz() { 
      currentIdx = 0; 
      score = 0; 
      updateQuiz(); 
      showScreen('screen-quiz'); 
    }
    
    function updateQuiz() { 
      document.getElementById('question-text').innerText = `${currentIdx + 1}. ${questions[currentIdx]}`; 
    }
    
    function nextQuestion(s) { 
      score += s; 
      currentIdx++; 
      if (currentIdx < questions.length) {
        updateQuiz();
      } else {
        showResult();
      }
    }
    
    function showResult() {
      // 5問 × 最大2点 = 10点満点。これを100点換算にする
      const finalScore = Math.round((score / 10) * 100);
      const offset = 527.7 - (527.7 * (finalScore / 100));
      
      document.getElementById('result-score').innerText = finalScore;
      setTimeout(() => { document.getElementById('gauge-circle').style.strokeDashoffset = offset; }, 100);
      
      let status = "";
      let msg = "";
      
      if (finalScore >= 80) {
        status = "極めて高い「心理集客力」です！";
        msg = "お客様の心理プロセスに寄り添った素晴らしい構成です。さらにCVR（成約率）を極限まで高めるための微細なABテストや、心理的導線の強化ポイントについて、無料相談でお気軽にお話ししましょう！";
      } else if (finalScore >= 50) {
        status = "伸びしろ多数！中位の心理設計です";
        msg = "ある程度の要素は揃っていますが、いくつかの「心理的障壁（心理的ノイズ）」によって成約を逃している可能性があります。少しの文言修正やボタン位置の変更で、反応率が劇的にアップする余地があります。";
      } else {
        status = "黄色信号！心理的ロスが多い状態です";
        msg = "ターゲットの感情や行動導線を無視した「情報羅列型」のサイトになっている可能性が高いです。お客様が途中で「めんどくさい」「怪しい」と感じて離脱している大きな穴を、心理学の視点からスッキリ修復しましょう！";
      }
      
      document.getElementById('result-status').innerText = status;
      document.getElementById('result-message').innerText = msg;
      showScreen('screen-result');
    }
    
    function sendResultToChat() {
      const finalScore = document.getElementById('result-score').innerText;
      const status = document.getElementById('result-status').innerText;
      liff.sendMessages([{ 
        type: 'text', 
        text: `【売れるHP心理診断結果】\n心理集客スコア：${finalScore}点 / 100点\n判定：${status}\n\n自社ホームページの改善点について相談したいです。` 
      }]).then(() => alert("診断結果をトークに送信しました！")).catch(() => alert("送信に失敗しました。LINEアプリ内で実行してください。"));
    }
  </script>
</body>
</html>
