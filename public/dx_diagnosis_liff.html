<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>和-Node | ビジネスDX診断</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-color: #f0f0f3; --text-color: #2c2c2a; --accent-color: #c8a84b; --tech-blue: #4a90e2; --shadow-light: #ffffff; --shadow-dark: #d1d1d6; --line-green: #06C755; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
    .app-container { width: 100%; max-width: 480px; padding: 24px; display: flex; flex-direction: column; gap: 24px; opacity: 0; transition: opacity 0.5s ease; }
    .app-container.loaded { opacity: 1; }
    header { text-align: center; margin-bottom: 8px; }
    .header-logo { font-size: 24px; font-weight: 700; letter-spacing: 0.1em; }
    .header-sub { font-family: 'Caveat', cursive; font-size: 18px; color: #666; }
    .neu-pressed { background: var(--bg-color); border-radius: 24px; box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light); border: 1px solid rgba(255,255,255,0.4); padding: 24px; }
    .neu-raised { background: var(--bg-color); border-radius: 24px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); border: none; }
    .screen { display: none; flex-direction: column; gap: 20px; animation: fadeIn 0.4s ease forwards; }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .btn { width: 100%; padding: 20px; font-size: 16px; font-weight: 700; color: var(--text-color); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
    .btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); transform: scale(0.97); }
    .gauge-container { width: 160px; height: 160px; margin: 20px auto; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); }
    .gauge-inner { width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light); }
    .gauge-value { font-size: 36px; font-weight: 700; color: var(--tech-blue); }
    .saving-card { padding: 20px; margin-top: 10px; text-align: center; }
    .btn-line { background: var(--line-green); color: #fff !important; border-radius: 20px; box-shadow: 0 10px 20px rgba(6, 199, 85, 0.3); }
    .loading-overlay { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s ease; }
  </style>
</head>
<body>
  <div id="loading" class="loading-overlay"><div class="header-logo">和-Node</div></div>
  <div class="app-container" id="app">
    <header><div class="header-logo">和-Node</div><div class="header-sub">ICT & DX Solutions</div></header>
    <section id="screen-home" class="screen active">
      <div class="neu-pressed"><div><span id="display-name" class="header-sub" style="font-size:24px; color:var(--tech-blue);">Partner</span> 様</div><p style="margin-top:8px;">あなたのビジネス、もっと楽に。<br>「DXの伸び代」を診断してみませんか？</p></div>
      <button class="btn neu-raised" onclick="startQuiz()">🚀 ビジネスDX診断を始める</button>
      <button class="btn neu-raised" onclick="showScreen('screen-menu')">⚙️ ICT・効率化メニュー</button>
    </section>
    <section id="screen-quiz" class="screen">
      <div class="neu-pressed" style="min-height:160px; display:flex; align-items:center; justify-content:center; text-align:center;"><p id="question-text" style="font-weight:700;"></p></div>
      <div style="display:flex; flex-direction:column; gap:16px;">
        <button class="btn neu-raised" onclick="nextQuestion(0)">すべてデジタル/自動化している</button>
        <button class="btn neu-raised" onclick="nextQuestion(1)">一部ツールを使っている</button>
        <button class="btn neu-raised" onclick="nextQuestion(2)">ほとんど手書き・アナログ作業</button>
      </div>
    </section>
    <section id="screen-result" class="screen">
      <div class="neu-pressed" style="text-align:center;">
        <p style="font-size:13px; font-weight:700;">診断結果：あなたのDX潜在力</p>
        <div class="gauge-container"><div class="gauge-inner"><div id="result-score" class="gauge-value">0</div><div style="font-size:11px; opacity:0.6;">Potential %</div></div></div>
        <div class="saving-card neu-pressed"><p style="font-size:12px; opacity:0.7;">IT化で削減できる推定時間</p><div id="saving-time" style="font-size:24px; font-weight:700; color:var(--accent-color); margin:8px 0;">0</div><p style="font-size:11px; color:#666;">（年間換算 / 1人あたり）</p></div>
      </div>
      <button class="btn btn-line" onclick="sendResultToChat()">💬 診断結果を相談に活かす</button>
      <button class="btn neu-raised" onclick="showScreen('screen-menu')">💡 おすすめの自動化を見る</button>
    </section>
    <section id="screen-menu" class="screen">
      <a href="https://lin.ee/o5QFPwc" style="text-decoration:none;"><button class="btn btn-line">💬 無料ICT相談（LINE）</button></a>
      <button class="btn" style="box-shadow:none;" onclick="showScreen('screen-home')">ホームに戻る</button>
    </section>
  </div>
  <script>
    let userName = "Partner";
    const questions = ["顧客情報や名簿の管理はどうしていますか？", "予約やお問い合わせの受付方法は？", "請求書や伝票の作成・管理はどうしていますか？", "社内やチームでの連絡ツールは何ですか？", "同じ作業の繰り返し（ルーチン）は多いですか？"];
    let currentIdx = 0, score = 0;
    liff.init({ liffId: "2009957459-rbQKLd6W" }).then(() => {
      if (liff.isLoggedIn()) { liff.getProfile().then(p => { document.getElementById('display-name').innerText = p.displayName; hideLoading(); }); }
      else { hideLoading(); }
    }).catch(hideLoading);
    function hideLoading() { document.getElementById('loading').style.opacity = '0'; setTimeout(() => { document.getElementById('loading').style.display = 'none'; document.getElementById('app').classList.add('loaded'); }, 500); }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function startQuiz() { currentIdx = 0; score = 0; updateQuiz(); showScreen('screen-quiz'); }
    function updateQuiz() { document.getElementById('question-text').innerText = questions[currentIdx]; }
    function nextQuestion(s) { score += s; currentIdx++; if (currentIdx < questions.length) updateQuiz(); else showResult(); }
    function showResult() {
      const potential = Math.round((score / (questions.length * 2)) * 100);
      const hoursSaved = score * 48;
      document.getElementById('result-score').innerText = potential;
      document.getElementById('saving-time').innerText = `約 ${hoursSaved} 時間`;
      showScreen('screen-result');
    }
    function sendResultToChat() {
      const potential = document.getElementById('result-score').innerText;
      liff.sendMessages([{ type: 'text', text: `【ビジネスDX診断結果】\nDX潜在力：${potential}%\n業務の効率化について相談したいです。` }]).then(() => alert("トークに送信しました。")).catch(() => alert("失敗しました。"));
    }
  </script>
</body>
</html>
