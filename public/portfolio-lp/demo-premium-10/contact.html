<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT | Premium 10 パッケージ | 和-Node</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../premium_upgrade.css">
<link rel="stylesheet" href="premium-layout.css">
<style>
.prem-form{max-width:700px; margin:60px auto; background:rgba(255,255,255,0.02); padding:60px; border-radius:40px; border:1px solid rgba(255,255,255,0.05);}
.form-field{margin-bottom:30px;}
.form-field label{display:block; font-size:12px; color:var(--prem-gold); letter-spacing:0.2em; margin-bottom:10px; font-weight:700;}
.form-field input, .form-field textarea{width:100%; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); padding:18px; border-radius:12px; color:#fff; font-family:inherit;}
.form-field input:focus{border-color:var(--prem-gold); outline:none;}
.prem-submit{width:100%; background:var(--prem-gold); color:#000; padding:20px; border:none; border-radius:50px; font-weight:900; font-size:16px; cursor:pointer; transition:0.3s;}
.prem-submit:hover{background:#fff; transform:translateY(-5px);}
</style>
</head>
<body>

<header class="prem-header">
  <a href="index.html" class="prem-logo">EXECUTIVE PREMIA</a>
  <nav class="prem-nav">
    <a href="index.html">TOP</a>
    <a href="concept.html">CONCEPT</a>
    <a href="service1.html">SERVICE</a>
    <a href="works1.html">WORKS</a>
    <a href="news.html">NEWS</a>
    <a href="faq.html">FAQ</a>
    <a href="contact.html" class="active prem-cta">CONTACT</a>
  </nav>
</header>

<main class="prem-container">
  <div class="reveal">
    <span class="prem-sec-label">GET IN TOUCH</span>
    <h1 style="font-family:'Noto Serif JP',serif; font-size:40px; text-align:center;">お問い合わせ あああああ</h1>
    
    <div class="prem-form">
      <div class="form-field">
        <label>NAME / お名前</label>
        <input type="text" placeholder="あああああ あああ">
      </div>
      <div class="form-field">
        <label>EMAIL / メールアドレス</label>
        <input type="email" placeholder="example@aaaaa.com">
      </div>
      <div class="form-field">
        <label>MESSAGE / お問い合わせ内容</label>
        <textarea rows="6" placeholder="あああああああああああああああ"></textarea>
      </div>
      <button class="prem-submit">CONFIRM & SEND</button>
    </div>
  </div>
</main>

<script src="../premium_upgrade.js"></script>
</body>
</html>
