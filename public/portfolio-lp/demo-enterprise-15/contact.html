<style>
.ent-form{max-width:800px; margin-top:60px;}
.ent-form-group{margin-bottom:35px;}
.ent-form-group label{display:block; font-weight:900; color:var(--ent-navy); margin-bottom:12px; font-size:14px;}
.ent-form-group input, .ent-form-group select, .ent-form-group textarea{width:100%; padding:18px; border:1px solid #ddd; border-radius:4px; font-family:inherit;}
.ent-submit{background:var(--ent-navy); color:#fff; padding:20px 60px; border:none; font-weight:700; letter-spacing:0.1em; cursor:pointer; transition:0.3s;}
.ent-submit:hover{background:var(--ent-blue);}
</style>

<main class="ent-container">
  <div class="reveal">
    <h1 style="font-family:'Noto Serif JP',serif; font-size:48px; color:var(--ent-navy); margin-bottom:60px;">お問い合わせ あああああ</h1>
    
    <div class="ent-form">
      <div class="ent-form-group">
        <label>お問い合わせ種別 ああああ</label>
        <select>
          <option>事業内容について</option>
          <option>採用について</option>
          <option>その他</option>
        </select>
      </div>
      <div class="ent-form-group">
        <label>お名前 ああああ</label>
        <input type="text" placeholder="あああああ あああ">
      </div>
      <div class="ent-form-group">
        <label>貴社名 ああああ</label>
        <input type="text" placeholder="あああああ株式会社">
      </div>
      <div class="ent-form-group">
        <label>お問い合わせ内容 ああああ</label>
        <textarea rows="6" placeholder="あああああああああああああああ"></textarea>
      </div>
      <button class="ent-submit">送信内容の確認へ</button>
    </div>
  </div>
