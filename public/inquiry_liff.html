<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>和-Node | お見積り・お問い合わせ</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Caveat:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg-color: #c0c294; 
      --text-color: #2c2c2a; 
      --accent-color: #c8a84b; 
      --stone-base: #3d4b40;
      --shadow-light: #dcdfb0; 
      --shadow-dark: #a4a678;
      --hanko-red: #b22d15;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: 'Noto Sans JP', sans-serif; 
      background-color: var(--bg-color); 
      color: var(--text-color); 
      display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
      background-image: radial-gradient(circle at 100% 150%, transparent 24%, var(--shadow-dark) 24%, var(--shadow-dark) 28%, transparent 28%, transparent 52%, var(--shadow-dark) 52%, var(--shadow-dark) 56%, transparent 56%);
      background-size: 40px 20px;
      background-attachment: fixed;
    }

    .app-container { width: 100%; max-width: 480px; padding: 24px; display: flex; flex-direction: column; gap: 24px; opacity: 0; transition: opacity 0.5s ease; z-index: 1; }
    .app-container.loaded { opacity: 1; }

    header { text-align: center; margin-bottom: 8px; }
    .header-logo { font-family: 'Shippori Mincho', serif; font-size: 26px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-color); }
    .header-sub { font-family: 'Caveat', cursive; font-size: 18px; color: #5a6a51; }
    
    .neu-pressed { 
      background: var(--bg-color); 
      border-radius: 4px; 
      box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light); 
      border: 1px solid rgba(0,0,0,0.05);
      padding: 30px 24px;
      position: relative;
    }

    .btn-rock { 
      width: 100%; padding: 24px; 
      font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 700; 
      color: #f5f5f0;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      background: var(--stone-base);
      background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(0,0,0,0.1) 0%, transparent 50%), linear-gradient(135deg, var(--stone-base) 0%, #2a352c 100%);
      border-radius: 12px 4px 15px 5px / 6px 10px 5px 12px;
      border: 1px solid rgba(0,0,0,0.2);
      box-shadow: 8px 8px 16px rgba(0,0,0,0.4), -2px -2px 6px rgba(255,255,255,0.05), inset 1px 1px 2px rgba(255,255,255,0.1);
      position: relative; overflow: hidden;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-shadow: -1px -1px 2px rgba(0,0,0,0.8), 1px 1px 1px rgba(255,255,255,0.2);
    }

    .btn-rock::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); opacity: 0.15; pointer-events: none; }
    .btn-rock:active { transform: translateY(3px) scale(0.98); box-shadow: 2px 2px 4px rgba(0,0,0,0.5); filter: brightness(0.9); }
    
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    label { font-size: 14px; font-weight: 700; font-family: 'Shippori Mincho', serif; padding-left: 4px; }
    textarea {
      width: 100%; padding: 16px; border-radius: 4px; border: none; outline: none;
      background: var(--bg-color); font-size: 15px;
      box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
      min-height: 120px; resize: none; font-family: 'Noto Sans JP', sans-serif;
    }

    .screen { display: none; flex-direction: column; gap: 24px; animation: fadeIn 0.5s ease forwards; }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    
    .hanko { width: 32px; height: 32px; border: 2px solid var(--hanko-red); border-radius: 4px; color: var(--hanko-red); font-size: 14px; display: flex; align-items: center; justify-content: center; font-weight: 900; writing-mode: vertical-rl; padding: 2px; line-height: 1; }
    .step-indicator { font-family: 'Shippori Mincho', serif; font-size: 12px; font-weight: 700; color: #5a6a51; text-align: center; margin-bottom: -15px; }
  </style>
</head>
<body>
  <div id="loading" style="background:var(--bg-color); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; z-index:1000;"><div class="header-logo">和-Node</div></div>
  <div class="app-container" id="app">
    <header><div class="header-logo">和-Node</div><div class="header-sub">Estimate & Inquiry</div></header>

    <section id="screen-category" class="screen active">
      <div class="step-indicator">壱</div>
      <div class="neu-pressed">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <p style="font-family:'Shippori Mincho',serif; font-weight:700;">ご相談内容をお選びください</p>
          <div class="hanko">問合</div>
        </div>
      </div>
      <button class="btn-rock" onclick="selectCategory('Web・LP制作', 'Web')">🌐 Web・LP制作</button>
      <button class="btn-rock" onclick="selectCategory('DX・業務効率化', 'DX')">⚙️ DX・業務効率化</button>
      <button class="btn-rock" onclick="selectCategory('心理カウンセリング', 'Counseling')">🧠 心理カウンセリング</button>
      <button class="btn-rock" onclick="selectCategory('その他', 'Other')">✉️ その他・ご質問</button>
    </section>

    <section id="screen-detail" class="screen">
      <div class="step-indicator">弐</div>
      <div class="neu-pressed">
        <p id="detail-title" style="font-family:'Shippori Mincho',serif; font-weight:700; text-align:center;"></p>
      </div>
      <div id="options-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
      <button style="background:none; border:none; text-decoration:underline; font-size:13px; cursor:pointer;" onclick="showScreen('screen-category')">戻る</button>
    </section>

    <section id="screen-form" class="screen">
      <div class="step-indicator">参</div>
      <div class="neu-pressed"><p style="font-size:13px; text-align:center;">詳細なメッセージがあれば承ります</p></div>
      <div class="form-group"><label>メッセージ</label><textarea id="form-message" placeholder="ご自由に記入ください"></textarea></div>
      <button id="send-btn" class="btn-rock" onclick="sendInquiry()" style="background:linear-gradient(135deg, #1a1a18 0%, #000000 100%);">📩 この内容で相談する</button>
      <button style="background:none; border:none; text-decoration:underline; font-size:13px; cursor:pointer;" onclick="showScreen('screen-category')">最初からやり直す</button>
    </section>
  </div>
  <script>
    let currentData = { category: '', detail: '', cost: '' };
    liff.init({ liffId: "YOUR_LIFF_ID" }).then(() => {
      document.getElementById('loading').style.display='none'; document.getElementById('app').classList.add('loaded');
    }).catch(() => { document.getElementById('loading').style.display='none'; document.getElementById('app').classList.add('loaded'); });
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function selectCategory(name, key) {
      currentData.category = name;
      const container = document.getElementById('options-container');
      const title = document.getElementById('detail-title');
      container.innerHTML = '';
      let options = [];
      if (key === 'Web') {
        title.innerText = "ご希望の制作内容は？";
        options = [{ n: "集客用LP", c: "10万円〜" }, { n: "小規模HP", c: "20万円〜" }, { n: "高度なミニアプリ", c: "30万円〜" }];
      } else if (key === 'DX') {
        title.innerText = "どのような効率化ですか？";
        options = [{ n: "自動化ツール開発", c: "5万円〜" }, { n: "LINE公式アカウント構築", c: "10万円〜" }, { n: "DXコンサルティング", c: "20万円〜" }];
      } else if (key === 'Counseling') {
        title.innerText = "ご希望のメニューは？";
        options = [{ n: "単発カウンセリング", c: "5,000円〜" }, { n: "1ヶ月チャット相談", c: "1万円〜" }, { n: "法人向けサポート", c: "要相談" }];
      } else { selectDetail('一般的なお問い合わせ', '要相談'); return; }
      options.forEach(opt => {
        const b = document.createElement('button'); b.className = 'btn-rock';
        b.innerHTML = `<div style="text-align:center;"><div>${opt.n}</div><div style="font-size:11px; opacity:0.8;">参考：${opt.c}</div></div>`;
        b.onclick = () => selectDetail(opt.n, opt.c);
        container.appendChild(b);
      });
      showScreen('screen-detail');
    }
    function selectDetail(name, cost) { currentData.detail = name; currentData.cost = cost; showScreen('screen-form'); }
    function sendInquiry() {
      const extraMsg = document.getElementById('form-message').value;
      const text = `【和-Node お見積り・お問い合わせ】\n\n■カテゴリ\n${currentData.category}\n\n■ご希望内容\n${currentData.detail}\n\n■参考価格\n${currentData.cost}\n\n■メッセージ\n${extraMsg || 'なし'}\n\n相談をお願いします。`;
      liff.sendMessages([{ type: 'text', text: text }]).then(() => { alert("送信しました！"); liff.closeWindow(); }).catch(() => alert("送信に失敗しました。"));
    }
  </script>
</body>
</html>
